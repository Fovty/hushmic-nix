name: Update HushMic

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v20
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Update package and flake inputs
        run: |
          nix flake update
          nix run nixpkgs#nix-update -- hushmic --flake
      - name: Verify package
        run: nix build .#hushmic
      - uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/update-hushmic
          delete-branch: true
          commit-message: "chore: update HushMic"
          title: "chore: update HushMic"
          body: "Automated update of HushMic and the pinned flake inputs."
