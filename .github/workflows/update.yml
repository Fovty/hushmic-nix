name: Update HushMic

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-flakehub: false
          use-gha-cache: true
      - name: Update, verify, and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          nix flake update
          nix run nixpkgs#nix-update -- hushmic --flake
          nix build .#hushmic
          if git diff --quiet; then
            echo "Already up to date."
          else
            git commit -am "chore: update HushMic and flake inputs"
            git push
          fi
